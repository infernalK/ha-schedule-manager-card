# Génère schedule-manager-card.js et le pousse sur main (requis pour HACS).
name: Build bundle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "rollup.config.js"
      - "tsconfig.json"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Commit bundle if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: build schedule-manager-card.js"
          file_pattern: schedule-manager-card.js
